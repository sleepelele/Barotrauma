<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barotrauma — Crew Applications Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#060e15; --panel:#0d1e2e; --panel2:#112233;
      --border:#1e3a50; --border2:#2a4e68;
      --accent:#8aad5a; --accent-dim:#4d6632;
      --rust:#c47a35; --rust-dim:#7a4a1e;
      --text:#7a9db0; --text-bright:#a8c4d4; --text-dim:#3a5a6e;
      --danger:#c43030; --success:#6aaa3a;
      --glow-g:0 0 14px rgba(138,173,90,0.35);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body { background:var(--bg); color:var(--text); font-family:'Exo 2',sans-serif; font-weight:300; min-height:100vh; }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; padding:20px;
    }
    .login-box {
      background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--rust);
      padding:40px 48px; max-width:400px; width:100%; text-align:center;
    }
    .login-icon { font-size:2.2rem; margin-bottom:16px; }
    .login-title {
      font-family:'Orbitron',sans-serif; font-size:0.9rem; font-weight:700;
      letter-spacing:0.22em; color:var(--rust); text-transform:uppercase; margin-bottom:6px;
    }
    .login-sub { font-family:'Share Tech Mono',monospace; font-size:0.68rem; color:var(--text-dim); letter-spacing:0.12em; margin-bottom:28px; }
    .login-input {
      width:100%; background:rgba(4,10,16,0.8); border:1px solid var(--border);
      color:var(--text-bright); font-family:'Share Tech Mono',monospace; font-size:0.9rem;
      padding:12px 14px; outline:none; margin-bottom:12px; letter-spacing:0.1em;
    }
    .login-input:focus { border-color:var(--accent-dim); }
    .login-btn {
      width:100%; font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.75rem;
      letter-spacing:0.2em; text-transform:uppercase; color:var(--bg);
      background:var(--accent); border:none; padding:13px; cursor:pointer;
      clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
      transition:all 0.2s;
    }
    .login-btn:hover { background:var(--text-bright); }
    .login-err { font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:var(--danger); margin-top:10px; min-height:1.2em; }

    /* ── DASHBOARD ── */
    .dashboard { display:none; padding:30px 20px 60px; max-width:1200px; margin:0 auto; }

    .dash-header {
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:16px; margin-bottom:28px;
      border-bottom:1px solid var(--border); padding-bottom:20px;
    }
    .dash-title { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:900; letter-spacing:0.14em; color:var(--text-bright); }
    .dash-title span { color:var(--accent); }
    .dash-meta { font-family:'Share Tech Mono',monospace; font-size:0.68rem; color:var(--text-dim); letter-spacing:0.1em; }

    /* Stats row */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
    .stat-card { background:var(--panel); border:1px solid var(--border); padding:16px 18px; }
    .stat-label { font-family:'Share Tech Mono',monospace; font-size:0.62rem; color:var(--text-dim); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px; }
    .stat-val { font-family:'Orbitron',sans-serif; font-size:1.4rem; font-weight:700; color:var(--accent); }
    .stat-val.rust { color:var(--rust); }

    /* Filters */
    .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; align-items:center; }
    .filter-label { font-family:'Share Tech Mono',monospace; font-size:0.68rem; color:var(--text-dim); letter-spacing:0.1em; }
    .filter-btn {
      font-family:'Share Tech Mono',monospace; font-size:0.68rem; letter-spacing:0.1em;
      border:1px solid var(--border); background:transparent; color:var(--text-dim);
      padding:6px 12px; cursor:pointer; transition:all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { border-color:var(--accent); color:var(--accent); }
    .search-input {
      font-family:'Share Tech Mono',monospace; font-size:0.72rem; letter-spacing:0.08em;
      border:1px solid var(--border); background:rgba(4,10,16,0.7);
      color:var(--text-bright); padding:6px 12px; outline:none; min-width:200px;
    }
    .search-input:focus { border-color:var(--accent-dim); }

    /* Application cards */
    .apps-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; }

    .app-card {
      background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent-dim);
      padding:20px; cursor:pointer; transition:all 0.2s; position:relative;
    }
    .app-card:hover { border-left-color:var(--accent); background:var(--panel2); box-shadow:0 0 20px rgba(0,0,0,0.4); }
    .app-card.clown-yes { border-left-color:var(--danger); }
    .app-card.salary-ahujel { border-left-color:var(--rust); }

    .app-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
    .app-name { font-family:'Orbitron',sans-serif; font-size:0.82rem; font-weight:700; color:var(--text-bright); letter-spacing:0.1em; }
    .app-age { font-family:'Share Tech Mono',monospace; font-size:0.65rem; color:var(--text-dim); margin-top:2px; }
    .app-role {
      font-family:'Orbitron',sans-serif; font-size:0.6rem; font-weight:700; letter-spacing:0.12em;
      text-transform:uppercase; padding:3px 8px; border:1px solid var(--accent-dim);
      color:var(--accent); background:rgba(138,173,90,0.08);
    }

    .app-fields { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
    .app-field { display:flex; gap:8px; font-family:'Share Tech Mono',monospace; font-size:0.68rem; }
    .app-field-key { color:var(--text-dim); min-width:90px; flex-shrink:0; }
    .app-field-val { color:var(--text); word-break:break-word; }
    .app-field-val.highlight { color:var(--accent); }
    .app-field-val.warn { color:var(--rust); }
    .app-field-val.danger { color:var(--danger); }

    .app-date { font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:var(--text-dim); letter-spacing:0.08em; }

    /* Game results badges */
    .game-badges { display:flex; gap:5px; flex-wrap:wrap; margin-top:8px; }
    .game-badge {
      font-family:'Share Tech Mono',monospace; font-size:0.58rem; letter-spacing:0.06em;
      padding:2px 7px; border:1px solid;
    }
    .game-badge.pass { border-color:var(--success); color:var(--success); }
    .game-badge.fail { border-color:var(--danger); color:var(--danger); }
    .game-badge.na   { border-color:var(--border); color:var(--text-dim); }

    /* Detail modal */
    .detail-modal {
      display:none; position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,0.85); overflow-y:auto; padding:20px;
    }
    .detail-modal.open { display:flex; align-items:flex-start; justify-content:center; }
    .detail-inner {
      background:#0a1520; border:1px solid var(--border2); border-left:3px solid var(--accent);
      padding:32px; max-width:700px; width:100%; margin:auto; position:relative;
    }
    .detail-close {
      position:absolute; top:16px; right:16px;
      font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:var(--text-dim);
      cursor:pointer; border:1px solid var(--border); background:transparent; padding:4px 10px;
      transition:all 0.2s;
    }
    .detail-close:hover { border-color:var(--accent); color:var(--accent); }
    .detail-title { font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700; color:var(--text-bright); letter-spacing:0.1em; margin-bottom:20px; }
    .detail-section { margin-bottom:18px; }
    .detail-section-title { font-family:'Orbitron',sans-serif; font-size:0.62rem; font-weight:700; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:6px; }
    .detail-row { display:grid; grid-template-columns:150px 1fr; gap:8px; margin-bottom:7px; font-family:'Share Tech Mono',monospace; font-size:0.72rem; }
    .detail-key { color:var(--text-dim); }
    .detail-val { color:var(--text-bright); word-break:break-word; }

    /* Loading */
    .loading { text-align:center; padding:60px 20px; font-family:'Share Tech Mono',monospace; font-size:0.8rem; color:var(--text-dim); letter-spacing:0.12em; }
    .loading-dot { display:inline-block; animation:blink 1s ease-in-out infinite; }
    .loading-dot:nth-child(2){ animation-delay:0.2s; }
    .loading-dot:nth-child(3){ animation-delay:0.4s; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .app-card { animation:fadeIn 0.4s ease both; }

    /* Empty state */
    .empty-state { text-align:center; padding:60px 20px; font-family:'Share Tech Mono',monospace; color:var(--text-dim); font-size:0.78rem; letter-spacing:0.1em; }

    /* Logout */
    .logout-btn {
      font-family:'Share Tech Mono',monospace; font-size:0.66rem; letter-spacing:0.12em;
      border:1px solid var(--border); background:transparent; color:var(--text-dim);
      padding:6px 12px; cursor:pointer; transition:all 0.2s;
    }
    .logout-btn:hover { border-color:var(--danger); color:var(--danger); }

    @media(max-width:600px) {
      .apps-grid { grid-template-columns:1fr; }
      .login-box { padding:28px 24px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <div class="login-title">EuropaCorp</div>
    <div class="login-sub">// CREW REQUISITION — RESTRICTED ACCESS //</div>
    <input type="password" class="login-input" id="pwInput" placeholder="Enter access code" autocomplete="off"/>
    <button class="login-btn" onclick="doLogin()">AUTHENTICATE</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <div class="dash-title">CREW APPLICATION <span>DASHBOARD</span></div>
      <div class="dash-meta" id="dashMeta">Loading...</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <button class="logout-btn" onclick="doLogout()">⏻ Logout</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="filters">
    <span class="filter-label">FILTER:</span>
    <button class="filter-btn active" onclick="filterRole('all',this)">All</button>
    <button class="filter-btn" onclick="filterRole('Captain',this)">Captain</button>
    <button class="filter-btn" onclick="filterRole('Medic',this)">Medic</button>
    <button class="filter-btn" onclick="filterRole('Engineer',this)">Engineer</button>
    <button class="filter-btn" onclick="filterRole('Mechanic',this)">Mechanic</button>
    <button class="filter-btn" onclick="filterRole('Security',this)">Security</button>
    <button class="filter-btn" onclick="filterRole('Assistant',this)">Assistant</button>
    <input type="text" class="search-input" id="searchInput" placeholder="Search by name..." oninput="filterSearch(this.value)"/>
  </div>

  <div id="appsContainer">
    <div class="loading">Retrieving personnel files <span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="detail-modal" id="detailModal" onclick="closeModal(event)">
  <div class="detail-inner" id="detailInner">
    <button class="detail-close" onclick="closeModal()">✕ CLOSE</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
var SUPA_URL = 'https://dyttrevzhxjmtdiynfpu.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5dHRyZXZ6aHhqbXRkaXluZnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzQzNTgsImV4cCI6MjA5MTA1MDM1OH0.jfEEylD0LnXmitqy7lWDmL0TlGADaCvIW-yDhmuZHTg';
var PASSWORD = 'suns123';
var allApps = [];
var currentRole = 'all';
var currentSearch = '';

// ── LOGIN ──
document.getElementById('pwInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogin() {
  var pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadApplications();
  } else {
    document.getElementById('loginErr').textContent = '✘ Access denied. Wrong code.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ── LOAD DATA ──
async function loadApplications() {
  try {
    var res = await fetch(SUPA_URL + '/rest/v1/applications?select=*&order=submitted_at.desc', {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    allApps = await res.json();
    renderStats();
    renderCards(allApps);
    document.getElementById('dashMeta').textContent =
      'LAST SYNC: ' + new Date().toLocaleTimeString() + ' | ' + allApps.length + ' RECORDS';
  } catch(err) {
    document.getElementById('appsContainer').innerHTML = '<div class="empty-state">⚠ Failed to load records. Check connection.</div>';
  }
}

// ── STATS ──
function renderStats() {
  var roles = ['Captain','Medic','Engineer','Mechanic','Security','Assistant'];
  var roleCounts = {};
  roles.forEach(function(r){ roleCounts[r] = 0; });
  var clownYes = 0, avgSalary = 0, ahujel = 0;

  allApps.forEach(function(a) {
    if (roleCounts[a.role] !== undefined) roleCounts[a.role]++;
    if (a.clown_history === 'yes') clownYes++;
    if (a.salary_pct === 99) ahujel++;
    else avgSalary += (a.salary_pct || 0);
  });

  var nonAhujel = allApps.length - ahujel;
  var avg = nonAhujel > 0 ? (avgSalary / nonAhujel).toFixed(1) : 0;
  var topRole = roles.reduce(function(a,b){ return roleCounts[a]>=roleCounts[b]?a:b; });

  var html = [
    stat('Total Applications', allApps.length, ''),
    stat('Clown Affiliated', clownYes, 'rust'),
    stat('Avg Salary Ask', avg + '%', ''),
    stat('Tu Ahujel? 🤨', ahujel, 'rust'),
    stat('Top Role: ' + topRole, roleCounts[topRole], ''),
  ].join('');
  document.getElementById('statsRow').innerHTML = html;
}

function stat(label, val, cls) {
  return '<div class="stat-card"><div class="stat-label">'+label+'</div><div class="stat-val '+cls+'">'+val+'</div></div>';
}

// ── RENDER CARDS ──
function renderCards(apps) {
  if (!apps.length) {
    document.getElementById('appsContainer').innerHTML = '<div class="empty-state">No applications match the current filter.</div>';
    return;
  }
  var html = '<div class="apps-grid">';
  apps.forEach(function(a, i) {
    var clownClass = a.clown_history === 'yes' ? ' clown-yes' : '';
    var ahujClass  = a.salary_pct === 99 ? ' salary-ahujel' : '';
    var sal = a.salary_pct === 99 ? '<span class="warn">Tu ahujel?!</span>' : (a.salary_pct || 0) + '%';
    var date = a.submitted_at ? new Date(a.submitted_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    var clownVal = a.clown_history === 'yes'
      ? '<span class="danger">YES 🤡</span>'
      : '<span class="highlight">No</span>';
    var ranking = a.role_ranking || a.role || '—';

    // Game badges
    function badge(val, label) {
      if (!val || val === 'not attempted') return '<span class="game-badge na">'+label+': N/A</span>';
      var p = val.indexOf('PASSED') >= 0;
      return '<span class="game-badge '+(p?'pass':'fail')+'">'+label+': '+(p?'✔':'✘')+'</span>';
    }

    html += '<div class="app-card'+clownClass+ahujClass+'" style="animation-delay:'+i*0.04+'s" onclick="openDetail('+i+')">'
      + '<div class="app-card-header">'
      + '<div><div class="app-name">'+(a.name||'Unknown')+'</div><div class="app-age">Age: '+(a.age||'?')+'</div></div>'
      + '<div class="app-role">'+(a.role||'—')+'</div>'
      + '</div>'
      + '<div class="app-fields">'
      + field('Salary', sal)
      + field('Clown Hist.', clownVal)
      + field('Available', truncate(a.availability, 40))
      + field('Drug of choice', truncate(a.likes, 35))
      + '</div>'
      + '<div class="game-badges">'
      + badge(a.game_cables, 'Cables')
      + badge(a.game_drug, 'Drug ID')
      + badge(a.game_reactor, 'Reactor')
      + badge(a.game_clown, 'Clown')
      + '</div>'
      + '<div class="app-date" style="margin-top:8px;">'+date+'</div>'
      + '</div>';
  });
  html += '</div>';
  document.getElementById('appsContainer').innerHTML = html;
}

function field(k, v) {
  return '<div class="app-field"><span class="app-field-key">'+k+'</span><span class="app-field-val">'+v+'</span></div>';
}
function truncate(s, n) {
  if (!s) return '—';
  return s.length > n ? s.slice(0, n) + '…' : s;
}

// ── FILTERS ──
function getFiltered() {
  return allApps.filter(function(a) {
    var roleMatch = currentRole === 'all' || (a.role || '') === currentRole;
    var searchMatch = !currentSearch || (a.name || '').toLowerCase().includes(currentSearch.toLowerCase());
    return roleMatch && searchMatch;
  });
}
function filterRole(role, btn) {
  currentRole = role;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderCards(getFiltered());
}
function filterSearch(val) {
  currentSearch = val;
  renderCards(getFiltered());
}

// ── DETAIL MODAL ──
function openDetail(idx) {
  var a = allApps[idx];
  if (!a) return;
  var sal = a.salary_pct === 99 ? 'Tu ahujel?!' : (a.salary_pct || 0) + '%';
  var date = a.submitted_at ? new Date(a.submitted_at).toLocaleString('en-GB') : '—';

  function row(k, v) {
    return '<div class="detail-row"><span class="detail-key">'+k+'</span><span class="detail-val">'+(v||'—')+'</span></div>';
  }
  function section(title, rows) {
    return '<div class="detail-section"><div class="detail-section-title">'+title+'</div>'+rows+'</div>';
  }

  var html = '<div class="detail-title">'+(a.name||'Unknown')+'</div>'
    + section('Personnel File',
        row('Age', a.age)
      + row('Primary Role', a.role)
      + row('Role Ranking', a.role_ranking)
      + row('Submitted', date)
    )
    + section('Assessment Answers',
        row('Favourite Drug', a.likes)
      + row('Dislikes', a.dislikes)
      + row('Experience', a.experience)
      + row('Heights Fear', a.afraid_of_heights)
      + row('Reactor Response', a.reactor_response)
      + row('Clown Response', a.clown_response)
      + row('Hull Response', a.hull_response)
      + row('Clown Mother', a.clown_history)
      + row('Morphine Defense', a.morphine_defense)
    )
    + section('Availability & Salary',
        row('Availability', a.availability)
      + row('Salary Ask', sal)
    )
    + section('Mini-Game Results',
        row('Cable Routing', a.game_cables)
      + row('Drug ID', a.game_drug)
      + row('Reactor', a.game_reactor)
      + row('Spot the Clown', a.game_clown)
    )
    + section('Declarations & Extras',
        row('Declarations', a.declarations)
      + row('Why Hire', a.why_hire)
      + row('Suggestions', a.suggestions)
    );

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('detailModal') || e.target === undefined) {
    document.getElementById('detailModal').classList.remove('open');
  }
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
